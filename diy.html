<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIY傩面具/服饰 - 傩舞非遗文化</title>
    <style>
        /* 全局样式重置+基础变量（统一使用项目通用色值） */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "思源宋体", "Microsoft YaHei", "PingFang SC", serif;
        }
        :root {
            /* 统一复用项目核心配色（和index/login/works页面完全一致） */
            --coconut-main: #883A24;
            --coconut-deep: #5C2818;
            --coconut-dark: #3D1A10;
            --warm-sand-gold: #E6C088;
            --soft-cream: #F8F0E3;
            --coconut-light: #A05236;
            --deep-brown-bg: #2D140B;
            
            --shadow: 0 4px 12px rgba(0,0,0,0.15);
            --glass: rgba(255,255,255,0.08);
            --border: 2px solid var(--warm-sand-gold);
        }

        /* 页面背景：和主页面完全一致的渐变+背景图 */
        body {
            background: linear-gradient(180deg, rgba(61, 26, 16, 0.9), rgba(136, 58, 36, 0.85), rgba(107, 53, 32, 0.9)),
                        url("https://hertige-nuowu.oss-cn-hangzhou.aliyuncs.com/splash-bg.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--soft-cream);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* 头部导航：和其他页面统一样式 */
        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(230, 192, 136, 0.3);
            background: rgba(45, 20, 11, 0.9);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--warm-sand-gold);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--coconut-deep);
            font-weight: bold;
        }
        .logo-text {
            font-size: 1.8rem;
            color: var(--warm-sand-gold);
            font-weight: 600;
            letter-spacing: 0.2rem;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
        }
        .nav-links a {
            color: var(--soft-cream);
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s ease;
            padding: 0.4rem 0;
            border-bottom: 2px solid transparent;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--warm-sand-gold);
            border-bottom: 2px solid var(--warm-sand-gold);
        }

        /* 主标题：匹配项目风格 */
        .page-title {
            text-align: center;
            margin: 2rem 0;
            font-size: 2.2rem;
            color: var(--warm-sand-gold);
            font-weight: 700;
            letter-spacing: 2px;
        }

        /* 核心DIY容器：响应式布局 */
        .diy-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
            align-items: start;
        }

        /* 画布区域 */
        .canvas-wrapper {
            background: #FFFFFF;
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        .canvas-wrapper:hover {
            transform: translateY(-2px);
        }
        #canvas {
            width: 100%;
            height: 650px;
            display: block;
        }

        /* 工具面板：匹配项目磨砂玻璃+金色边框风格 */
        .tool-panel {
            background: rgba(92, 40, 24, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            border: var(--border);
            padding: 1.8rem;
            box-shadow: var(--shadow);
        }
        .tool-section {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(230, 192, 136, 0.3);
        }
        .tool-section:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        .tool-title {
            color: var(--warm-sand-gold);
            font-size: 1.2rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tool-title i {
            font-size: 1rem;
        }

        /* 颜色选择器 */
        .color-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .color-item {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: transform 0.2s ease;
        }
        .color-item:hover {
            transform: scale(1.1);
        }
        .color-item.active {
            border-color: var(--warm-sand-gold);
            box-shadow: 0 0 0 2px rgba(230, 192, 136, 0.5);
        }

        /* 画笔大小调节 */
        .brush-size {
            width: 100%;
            margin: 1rem 0;
        }
        .brush-size input {
            width: 100%;
            accent-color: var(--warm-sand-gold);
        }
        .brush-size-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--soft-cream);
            margin-top: 0.5rem;
        }

        /* 按钮样式：统一使用项目按钮风格 */
        .btn {
            width: 100%;
            padding: 0.9rem 0;
            background: linear-gradient(135deg, var(--coconut-deep), var(--coconut-dark));
            border: var(--border);
            color: var(--warm-sand-gold);
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            margin-bottom: 0.8rem;
        }
        .btn:hover {
            background: var(--warm-sand-gold);
            color: var(--coconut-dark);
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-template {
            background: linear-gradient(135deg, var(--coconut-main), var(--coconut-deep));
        }

        /* 上传区域 */
        .upload-area {
            width: 100%;
            padding: 1rem;
            border: 2px dashed var(--warm-sand-gold);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }
        .upload-area:hover {
            background: rgba(230, 192, 136, 0.1);
        }
        .upload-area input {
            display: none;
        }
        .upload-text {
            font-size: 0.95rem;
            color: var(--soft-cream);
        }

        /* 响应式适配 */
        @media (max-width: 992px) {
            .diy-container {
                grid-template-columns: 1fr;
            }
            #canvas {
                height: 500px;
            }
            .page-title {
                font-size: 1.8rem;
            }
        }
        @media (max-width: 576px) {
            #canvas {
                height: 400px;
            }
            .nav-links {
                gap: 1rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .logo-text {
                font-size: 1.2rem;
            }
            .tool-panel {
                padding: 1.2rem;
            }
            header {
                padding: 1rem 5%;
            }
        }
    </style>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 头部导航（和其他页面统一跳转链接） -->
    <header>
        <div class="logo">
            <div class="logo-icon">傩</div>
            <div class="logo-text">傩舞文化</div>
        </div>
        <nav class="nav-links">
            <a href="index.html">首页</a>
            <a href="diy.html" class="active">DIY设计</a>
            <a href="index.html#intro">文化介绍</a>
            <a href="works.html">作品展示</a>
            <a href="works.html">个人中心</a>
        </nav>
    </header>

    <!-- 页面标题 -->
    <h1 class="page-title">非遗傩面具 / 服饰 自由创作</h1>

    <!-- 核心DIY区域 -->
    <div class="diy-container">
        <!-- 画布区域 -->
        <div class="canvas-wrapper">
            <canvas id="canvas" width="1200" height="650"></canvas>
        </div>

        <!-- 工具面板 -->
        <div class="tool-panel">
            <!-- 1. 画笔设置 -->
            <div class="tool-section">
                <h3 class="tool-title"><i class="fas fa-paint-brush"></i> 画笔设置</h3>
                <!-- 颜色选择 -->
                <div class="color-selector">
                    <div class="color-item active" style="background: #3D1A10;" data-color="#3D1A10"></div>
                    <div class="color-item" style="background: #883A24;" data-color="#883A24"></div>
                    <div class="color-item" style="background: #E6C088;" data-color="#E6C088"></div>
                    <div class="color-item" style="background: #F8F0E3;" data-color="#F8F0E3"></div>
                    <div class="color-item" style="background: #FF0000;" data-color="#FF0000"></div>
                    <div class="color-item" style="background: #FFFF00;" data-color="#FFFF00"></div>
                    <div class="color-item" style="background: #0000FF;" data-color="#0000FF"></div>
                </div>
                <!-- 画笔大小 -->
                <div class="brush-size">
                    <input type="range" id="brushSize" min="1" max="30" value="5">
                    <div class="brush-size-label">
                        <span>画笔大小：1px</span>
                        <span id="brushSizeValue">5px</span>
                    </div>
                </div>
                <!-- 撤销按钮 -->
                <button class="btn" id="undoBtn"><i class="fas fa-undo"></i> 撤销上一步</button>
            </div>

            <!-- 2. 模板选择 -->
            <div class="tool-section">
                <h3 class="tool-title"><i class="fas fa-mask"></i> 模板选择</h3>
                <button class="btn btn-template" id="drawMask"><i class="fas fa-theater-masks"></i> 绘制傩面具模板</button>
                <button class="btn btn-template" id="drawClothes"><i class="fas fa-shirt"></i> 绘制服饰模板</button>
            </div>

            <!-- 3. 操作按钮 -->
            <div class="tool-section">
                <h3 class="tool-title"><i class="fas fa-cogs"></i> 作品操作</h3>
                <button class="btn" id="clearCanvas"><i class="fas fa-trash"></i> 清空画布</button>
                <button class="btn" id="saveCanvas"><i class="fas fa-save"></i> 保存作品</button>
            </div>

            <!-- 4. 自定义上传 -->
            <div class="tool-section">
                <h3 class="tool-title"><i class="fas fa-upload"></i> 自定义模板</h3>
                <label class="upload-area">
                    <input type="file" id="uploadTemplate" accept=".png,.jpg,.jpeg,.svg">
                    <div class="upload-text">
                        <i class="fas fa-cloud-upload"></i> 点击上传自定义模板<br>
                        <small>支持PNG/JPG/SVG格式</small>
                    </div>
                </label>
            </div>
        </div>
    </div>

    <script>
        // ========== 登录校验（和works.html保持一致） ==========
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('nuowu_user'));
            if (!user) {
                alert('请先登录后再进行DIY创作！');
                window.location.href = 'login.html';
                return;
            }
            initCanvas();
            bindEvents();
        });

        // ========== 核心画布功能 ==========
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let currentColor = '#3D1A10';
        let brushSize = 5;
        let drawingHistory = []; // 绘制历史（用于撤销）
        let historyIndex = -1;

        // 初始化画布背景
        function initCanvas() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            saveHistory(); // 保存初始状态
        }

        // 保存绘制历史
        function saveHistory() {
            if (historyIndex < drawingHistory.length - 1) {
                drawingHistory = drawingHistory.slice(0, historyIndex + 1);
            }
            drawingHistory.push(canvas.toDataURL());
            historyIndex = drawingHistory.length - 1;
        }

        // 撤销功能
        function undoDrawing() {
            if (historyIndex > 0) {
                historyIndex--;
                const img = new Image();
                img.src = drawingHistory[historyIndex];
                img.onload = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            } else {
                alert('已经到最开始的状态啦～');
            }
        }

        // ========== 绘制逻辑（兼容鼠标+触摸） ==========
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            let x, y;
            if (e.type.includes('touch')) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            // 适配画布缩放比例
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: x * scaleX,
                y: y * scaleY
            };
        }

        function startDraw(e) {
            isDrawing = true;
            const { x, y } = getCanvasPos(e);
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = currentColor;
            ctx.lineWidth = brushSize;
            e.preventDefault();
        }

        function draw(e) {
            if (!isDrawing) return;
            const { x, y } = getCanvasPos(e);
            ctx.lineTo(x, y);
            ctx.stroke();
            e.preventDefault();
        }

        function endDraw() {
            if (isDrawing) {
                isDrawing = false;
                saveHistory(); // 绘制完成后保存历史
            }
        }

        // ========== 模板绘制 ==========
        // 绘制傩面具模板
        function drawMaskTemplate() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制傩面具轮廓（非遗风格）
            ctx.strokeStyle = '#3D1A10';
            ctx.lineWidth = 3;
            ctx.beginPath();
            // 面具外轮廓
            ctx.arc(canvas.width/2, canvas.height/2 - 50, 150, 0, Math.PI * 2);
            // 眼睛
            ctx.arc(canvas.width/2 - 60, canvas.height/2 - 60, 25, 0, Math.PI * 2);
            ctx.arc(canvas.width/2 + 60, canvas.height/2 - 60, 25, 0, Math.PI * 2);
            // 鼻子
            ctx.moveTo(canvas.width/2, canvas.height/2 - 30);
            ctx.lineTo(canvas.width/2 - 30, canvas.height/2 + 20);
            ctx.lineTo(canvas.width/2 + 30, canvas.height/2 + 20);
            ctx.closePath();
            // 嘴巴
            ctx.arc(canvas.width/2, canvas.height/2 + 40, 40, 0, Math.PI);
            ctx.stroke();
            
            saveHistory();
        }

        // 绘制服饰模板
        function drawClothesTemplate() {
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制傩舞服饰轮廓
            ctx.strokeStyle = '#3D1A10';
            ctx.lineWidth = 3;
            ctx.beginPath();
            // 上衣
            ctx.rect(canvas.width/2 - 120, canvas.height/2 - 80, 240, 200);
            // 领口
            ctx.moveTo(canvas.width/2 - 40, canvas.height/2 - 80);
            ctx.lineTo(canvas.width/2, canvas.height/2 - 40);
            ctx.lineTo(canvas.width/2 + 40, canvas.height/2 - 80);
            // 袖子
            ctx.rect(canvas.width/2 - 120, canvas.height/2 - 80, 60, 120);
            ctx.rect(canvas.width/2 + 60, canvas.height/2 - 80, 60, 120);
            // 下摆装饰
            ctx.moveTo(canvas.width/2 - 120, canvas.height/2 + 120);
            ctx.lineTo(canvas.width/2 - 80, canvas.height/2 + 140);
            ctx.lineTo(canvas.width/2 - 40, canvas.height/2 + 120);
            ctx.lineTo(canvas.width/2, canvas.height/2 + 140);
            ctx.lineTo(canvas.width/2 + 40, canvas.height/2 + 120);
            ctx.lineTo(canvas.width/2 + 80, canvas.height/2 + 140);
            ctx.lineTo(canvas.width/2 + 120, canvas.height/2 + 120);
            ctx.stroke();
            
            saveHistory();
        }

        // ========== 作品保存（关联用户，同步到works.html） ==========
        function saveCanvasAsImage() {
            const user = JSON.parse(localStorage.getItem('nuowu_user'));
            if (!user) return;

            // 生成作品信息
            const workData = {
                username: user.username,
                img: canvas.toDataURL('image/png'),
                time: new Date().toLocaleString('zh-CN'),
                id: Date.now()
            };

            // 读取现有作品并追加新作品
            const allWorks = JSON.parse(localStorage.getItem('nuowu_works')) || [];
            allWorks.push(workData);
            localStorage.setItem('nuowu_works', JSON.stringify(allWorks));

            // 下载图片+提示
            const link = document.createElement('a');
            link.download = `傩舞DIY作品_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
            alert('作品保存成功！可在「个人中心/作品展示」查看');
        }

        // ========== 上传自定义模板 ==========
        function handleUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    // 清空画布并绘制上传的图片（居中显示）
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    const scale = Math.min(canvas.width / img.width, canvas.height / img.height, 1);
                    const x = (canvas.width - img.width * scale) / 2;
                    const y = (canvas.height - img.height * scale) / 2;
                    ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
                    saveHistory(); // 保存上传模板的状态
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ========== 绑定所有事件 ==========
        function bindEvents() {
            // 画布绘制事件（鼠标+触摸）
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);
            
            canvas.addEventListener('touchstart', startDraw);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', endDraw);

            // 颜色选择
            document.querySelectorAll('.color-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.color-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    currentColor = this.dataset.color;
                });
            });

            // 画笔大小调节
            const brushSizeInput = document.getElementById('brushSize');
            const brushSizeValue = document.getElementById('brushSizeValue');
            brushSizeInput.addEventListener('input', function() {
                brushSize = this.value;
                brushSizeValue.textContent = `${brushSize}px`;
            });

            // 功能按钮
            document.getElementById('undoBtn').addEventListener('click', undoDrawing);
            document.getElementById('drawMask').addEventListener('click', drawMaskTemplate);
            document.getElementById('drawClothes').addEventListener('click', drawClothesTemplate);
            document.getElementById('clearCanvas').addEventListener('click', function() {
                if (confirm('确定要清空画布吗？')) {
                    initCanvas();
                }
            });
            document.getElementById('saveCanvas').addEventListener('click', saveCanvasAsImage);
            
            // 上传模板
            document.getElementById('uploadTemplate').addEventListener('change', handleUpload);
        }
    </script>
</body>
</html>
