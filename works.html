<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的DIY作品 - 傩舞非遗</title>
<!-- 引入Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: "思源宋体", "Microsoft YaHei", serif;
}
:root {
--coconut-main: #883A24;
--coconut-deep: #5C2818;
--warm-sand-gold: #E6C088;
--soft-cream: #F8F0E3;
}
body {
background: linear-gradient(180deg, rgba(61, 26, 16, 0.9), rgba(136, 58, 36, 0.85), rgba(107, 53, 32, 0.9)),
url("https://hertige-nuowu.oss-cn-hangzhou.aliyuncs.com/splash-bg.jpg");
background-size: cover;
background-position: center;
background-attachment: fixed;
color: var(--soft-cream);
min-height: 100vh;
}
header {
padding: 1.5rem 5%;
display: flex;
justify-content: space-between;
align-items: center;
background: rgba(45, 20, 11, 0.9);
border-bottom: 1px solid rgba(230, 192, 136, 0.3);
}
.logo { color: var(--warm-sand-gold); font-size: 1.8rem; font-weight: bold; }
.nav-links a { color: var(--soft-cream); margin: 0 1rem; text-decoration: none; }
.nav-links a:hover { color: var(--warm-sand-gold); }
.work-container { max-width: 1200px; margin: 3rem auto; padding: 0 5%; }
.work-title { text-align: center; color: var(--warm-sand-gold); font-size: 2.2rem; margin-bottom: 2rem; }
.work-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 2rem; }
.work-card { background: rgba(92,40,24,0.7); border: 2px solid var(--warm-sand-gold); border-radius: 12px; overflow: hidden; }
.work-img { width: 100%; height: 300px; object-fit: cover; }
.work-info { padding: 1rem; text-align: center; }
.download-btn { padding: 0.8rem 1.5rem; background: var(--coconut-deep); color: var(--warm-sand-gold); border: 1px solid var(--warm-sand-gold); border-radius: 8px; cursor: pointer; margin-top: 0.5rem; }
.download-btn:hover { background: var(--warm-sand-gold); color: var(--coconut-dark); }
.empty { text-align: center; padding: 4rem; font-size: 1.2rem; }
footer { text-align: center; padding: 2rem; border-top: 1px solid rgba(230,192,136,0.3); }
</style>
</head>
<body>
<header>
<div class="logo">傩舞文化</div>
<div class="nav-links">
<a href=" ">返回首页</a >
<a href="diy.html">DIY设计</a >
<a href="works.html" id="userCenter">个人中心</a >
<a href="javascript:logout()">退出登录</a >
</div>
</header>
<div class="work-container">
<h1 class="work-title">我的DIY作品库</h1>
<div class="work-grid" id="workGrid">
    <div class="empty">正在加载你的作品...</div>
</div>
</div>
<footer>
<p>© 2024 傩舞非遗文化传承 | 中国非物质文化遗产保护项目</p >
</footer>

<script>
// 初始化Supabase（替换成你自己的信息）
const supabaseUrl = "https://gdyamgzjawtaxgfunfzf.supabase.co";
const supabaseAnonKey = "sb_publishable_QQjWgVlFY_WW_rqOtZ-RMg_v3oK0dUi";
const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

let currentUser = null;

// 页面加载：登录校验+拉取云端作品
window.addEventListener('load', async () => {
    // 校验登录状态
    const { data: { user } } = await supabase.auth.getUser();
    if (!user) {
        alert('请先登录！');
        window.location.href = 'login.html';
        return;
    }
    currentUser = user;
    // 更新页面显示
    checkLoginStatus();
    // 拉取并渲染作品
    renderWorks();
});

// 从云端拉取并渲染当前用户的所有作品
async function renderWorks() {
    const grid = document.getElementById('workGrid');
    
    // 从Supabase查询当前用户的作品，按创建时间倒序
    const { data: works, error } = await supabase
        .from('nuowu_user_works')
        .select('*')
        .eq('user_id', currentUser.id)
        .order('created_at', { ascending: false });

    // 处理异常
    if (error) {
        grid.innerHTML = '<div class="empty">作品加载失败，请刷新页面重试</div>';
        console.error('作品加载失败：', error);
        return;
    }

    // 无作品的情况
    if (works.length === 0) {
        grid.innerHTML = '<div class="empty">暂无作品，快去DIY设计页创作吧！</div>';
        return;
    }

    // 渲染作品列表
    grid.innerHTML = works.map(work => `
        <div class="work-card">
            < img src="${work.work_img}" class="work-img" alt="傩舞DIY作品">
            <div class="work-info">
                <p>创作时间：${new Date(work.created_at).toLocaleString('zh-CN')}</p >
                <button class="download-btn" onclick="downloadImg('${work.work_img}', '${work.work_id}')">下载作品</button>
            </div>
        </div>
    `).join('');
}

// 下载图片功能
function downloadImg(url, workId) {
    const a = document.createElement('a');
    a.href = url;
    a.download = `傩舞DIY作品_${workId}.png`;
    a.click();
}

// 退出登录功能
async function logout() {
    const { error } = await supabase.auth.signOut();
    if (!error) {
        alert('退出成功！');
        window.location.href = 'index.html';
    }
}

// 登录状态显示
function checkLoginStatus() {
    const username = currentUser.user_metadata?.username || currentUser.email.split('@')[0];
    document.getElementById('userCenter').innerText = `${username}｜作品库`;
}
</script>
</body>
</html>
