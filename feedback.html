<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言反馈 - 千年傩韵 面具传魂</title>
    <style>
        /* 完全复用主界面核心配色，保证风格100%统一 */
        :root {
            --coconut-main: #883A24;
            --coconut-deep: #5C2818;
            --coconut-dark: #3D1A10;
            --coconut-light: #A05236;
            --warm-sand-gold: #E6C088;
            --soft-cream: #F8F0E3;
            --deep-brown-bg: #2D140B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "思源宋体", "Microsoft YaHei", serif;
        }

        body {
            /* 和主界面完全一致的背景，加兜底渐变防止图片加载失败 */
            background: 
                linear-gradient(180deg, rgba(61, 26, 16, 0.95), rgba(136, 58, 36, 0.92), rgba(107, 53, 32, 0.95)),
                url("https://hertige-nuowu.oss-cn-hangzhou.aliyuncs.com/splash-bg.jpg") center/cover no-repeat fixed;
            background-color: var(--coconut-main);
            color: var(--soft-cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 导航栏升级：和主界面质感完全对齐，加细微光影 */
        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(230, 192, 136, 0.3);
            background: rgba(45, 20, 11, 0.92);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 1.8rem;
            color: var(--warm-sand-gold);
            font-weight: bold;
            letter-spacing: 0.2rem;
            text-decoration: none;
            text-shadow: 0 2px 8px rgba(61, 26, 16, 0.8);
            transition: all 0.3s ease;
        }

        .logo:hover {
            color: #fff;
            text-shadow: 0 0 12px rgba(230, 192, 136, 0.6);
        }

        .back-link {
            color: var(--soft-cream);
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid var(--warm-sand-gold);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            background: rgba(92, 40, 24, 0.3);
        }

        .back-link:hover {
            background: var(--warm-sand-gold);
            color: var(--coconut-dark);
            transform: translateX(-3px);
            box-shadow: 0 4px 15px rgba(230, 192, 136, 0.4);
        }

        /* 反馈容器：优化居中逻辑，加页面呼吸感 */
        .feedback-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 5%;
            position: relative;
        }

        /* 卡片质感升级：非遗厚重感，加内发光、多层阴影 */
        .feedback-box {
            background: linear-gradient(135deg, rgba(92, 40, 24, 0.75), rgba(61, 26, 16, 0.65));
            border: 1px solid rgba(230, 192, 136, 0.35);
            border-radius: 18px;
            padding: 3.5rem;
            max-width: 720px;
            width: 100%;
            box-shadow: 
                0 10px 40px rgba(61, 26, 16, 0.7),
                inset 0 1px 0 rgba(230, 192, 136, 0.15);
            backdrop-filter: blur(10px);
            animation: cardFadeIn 0.6s ease-out;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 标题升级：加国风装饰线，贴合非遗主题 */
        .feedback-title {
            font-size: 2.4rem;
            color: var(--warm-sand-gold);
            text-align: center;
            margin-bottom: 0.8rem;
            letter-spacing: 0.3rem;
            position: relative;
            text-shadow: 0 2px 10px rgba(61, 26, 16, 0.8);
            padding-bottom: 1rem;
        }

        .feedback-title::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--warm-sand-gold), transparent);
        }

        .feedback-subtitle {
            text-align: center;
            color: var(--soft-cream);
            opacity: 0.85;
            margin-bottom: 3rem;
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* 表单字段升级：优化间距、交互质感 */
        .form-group {
            margin-bottom: 2rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.8rem;
            color: var(--warm-sand-gold);
            font-weight: 600;
            letter-spacing: 0.1rem;
            font-size: 1.05rem;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 1.1rem 1.2rem;
            background: rgba(61, 26, 16, 0.65);
            border: 1px solid var(--coconut-light);
            border-radius: 10px;
            color: var(--soft-cream);
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        /* 输入框hover/focus效果升级，和主界面风格统一 */
        .form-input:hover, .form-textarea:hover, .form-select:hover {
            border-color: rgba(230, 192, 136, 0.6);
        }

        .form-input:focus, .form-textarea:focus, .form-select:focus {
            outline: none;
            border-color: var(--warm-sand-gold);
            box-shadow: 
                0 0 0 3px rgba(230, 192, 136, 0.15),
                inset 0 2px 4px rgba(0,0,0,0.2);
            background: rgba(61, 26, 16, 0.8);
        }

        .form-textarea {
            min-height: 160px;
            resize: vertical;
            line-height: 1.8;
        }

        .form-select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23E6C088' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            padding-right: 3rem;
        }

        /* 提交按钮质感升级：和主界面按钮完全对齐，加按压动画 */
        .submit-btn {
            width: 100%;
            padding: 1.3rem;
            background: linear-gradient(135deg, var(--coconut-deep), var(--coconut-dark));
            border: 2px solid var(--warm-sand-gold);
            color: var(--warm-sand-gold);
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3rem;
            margin-top: 0.5rem;
            box-shadow: 0 4px 15px rgba(61, 26, 16, 0.6);
        }

        .submit-btn:hover {
            background: var(--warm-sand-gold);
            color: var(--coconut-dark);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(230, 192, 136, 0.5);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* 成功页面升级：加淡入动画，质感统一 */
        .success-message {
            display: none;
            text-align: center;
            padding: 2.5rem 2rem;
            animation: successFadeIn 0.6s ease-out;
        }

        @keyframes successFadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success-icon {
            font-size: 4.5rem;
            color: var(--warm-sand-gold);
            margin-bottom: 1.2rem;
            animation: iconBounce 1s ease-in-out infinite alternate;
        }

        @keyframes iconBounce {
            from {
                transform: translateY(0);
            }
            to {
                transform: translateY(-10px);
            }
        }

        .success-text {
            font-size: 1.2rem;
            color: var(--soft-cream);
            line-height: 1.8;
            margin-bottom: 0.5rem;
        }

        /* 页脚升级：和主界面完全对齐 */
        footer {
            text-align: center;
            padding: 2rem 5%;
            margin-top: auto;
            border-top: 1px solid rgba(230, 192, 136, 0.3);
            color: rgba(248, 240, 227, 0.7);
            background: rgba(45, 20, 11, 0.8);
        }

        /* 响应式优化：手机端完美适配 */
        @media (max-width: 768px) {
            .feedback-box {
                padding: 2rem 1.5rem;
                border-radius: 14px;
            }

            .feedback-title {
                font-size: 1.8rem;
                letter-spacing: 0.2rem;
            }

            .feedback-subtitle {
                font-size: 0.95rem;
                margin-bottom: 2rem;
            }

            .form-group {
                margin-bottom: 1.5rem;
            }

            .form-label {
                font-size: 1rem;
            }

            .submit-btn {
                font-size: 1.1rem;
                padding: 1.1rem;
                letter-spacing: 0.2rem;
            }

            header {
                padding: 1rem 5%;
                flex-direction: column;
                gap: 1rem;
            }

            .logo {
                font-size: 1.5rem;
            }

            .success-icon {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">傩舞文化</a>
        <a href="index.html" class="back-link">← 返回主页</a>
    </header>

    <main class="feedback-container">
        <div class="feedback-box" id="feedbackFormBox">
            <h2 class="feedback-title">留言反馈</h2>
            <p class="feedback-subtitle">您的每一条建议，都是非遗传承的助力</p>
            
            <!-- 表单核心功能100%完全保留，一丝未改，确保数据存储正常 -->
            <form action="https://formsubmit.co/2479161761@qq.com" method="POST">
                <div class="form-group">
                    <label class="form-label">称呼 / Name</label>
                    <input type="text" name="name" class="form-input" placeholder="如何称呼您 (选填)">
                </div>

                <div class="form-group">
                    <label class="form-label">联系邮箱 / Email</label>
                    <input type="email" name="email" class="form-input" placeholder="方便我们回复您 (选填)">
                </div>

                <div class="form-group">
                    <label class="form-label">反馈类型 / Type</label>
                    <select name="type" class="form-select">
                        <option value="文化建议">文化建议</option>
                        <option value="问题反馈">问题反馈</option>
                        <option value="合作洽谈">合作洽谈</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">留言内容 / Message *</label>
                    <textarea name="message" class="form-textarea" required placeholder="请留下您的宝贵意见..."></textarea>
                </div>

                <!-- 隐藏配置完全保留，确保邮件发送正常 -->
                <input type="hidden" name="_subject" value="【傩舞非遗网站】新留言通知">
                <input type="hidden" name="_template" value="table">
                <input type="hidden" name="_captcha" value="false">

                <button type="submit" class="submit-btn">提交留言</button>
            </form>
        </div>

        <div class="feedback-box success-message" id="successMessage">
            <div class="success-icon">🙏</div>
            <h2 class="feedback-title">感谢您的留言</h2>
            <p class="success-text">您的意见我们已收到，傩文化的传承之路，感谢有您同行。</p>
            <a href="index.html" class="back-link" style="display: inline-block; margin-top: 2rem;">返回主页</a>
        </div>
    </main>

    <footer>
        <p>© 2024 傩舞非遗文化传承 | 中国非物质文化遗产保护项目</p>
    </footer>

    <script>
        // 提交逻辑完全保留，仅优化动画流畅度
        const form = document.querySelector('form');
        const formBox = document.getElementById('feedbackFormBox');
        const successMsg = document.getElementById('successMessage');

        form.addEventListener('submit', function () {
            setTimeout(() => {
                formBox.style.display = 'none';
                successMsg.style.display = 'block';
                // 提交后滚动到页面顶部，优化体验
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 600);
        });

        // 导航栏滚动效果，和主界面体验统一
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.style.boxShadow = '0 4px 15px rgba(45, 20, 11, 0.8)';
            } else {
                header.style.boxShadow = 'none';
            }
        });
    </script>
</body>
</html>
