<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言反馈 - 千年傩韵 面具传魂</title>
    <style>
        :root {
            --coconut-main: #883A24;
            --coconut-deep: #5C2818;
            --coconut-dark: #3D1A10;
            --coconut-light: #A05236;
            --warm-sand-gold: #E6C088;
            --soft-cream: #F8F0E3;
            --deep-brown-bg: #2D140B;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            background: linear-gradient(180deg, rgba(61, 26, 16, 0.95), rgba(136, 58, 36, 0.9)),
                        url("https://hertige-nuowu.oss-cn-hangzhou.aliyuncs.com/splash-bg.jpg") center/cover fixed;
            color: var(--soft-cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(230, 192, 136, 0.3);
            background: rgba(45, 20, 11, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            color: var(--warm-sand-gold);
            font-weight: bold;
            letter-spacing: 0.2rem;
            text-decoration: none;
        }

        .back-link {
            color: var(--soft-cream);
            text-decoration: none;
            font-size: 1rem;
            border: 1px solid var(--warm-sand-gold);
            padding: 0.5rem 1.5rem;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background: var(--warm-sand-gold);
            color: var(--coconut-dark);
        }

        .feedback-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 5%;
        }

        .feedback-box {
            background: rgba(92, 40, 24, 0.7);
            border: 1px solid rgba(230, 192, 136, 0.3);
            border-radius: 16px;
            padding: 3rem;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(61, 26, 16, 0.6);
        }

        .feedback-title {
            font-size: 2.2rem;
            color: var(--warm-sand-gold);
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3rem;
        }

        .feedback-subtitle {
            text-align: center;
            color: var(--soft-cream);
            opacity: 0.8;
            margin-bottom: 2.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--warm-sand-gold);
            font-weight: bold;
            letter-spacing: 0.1rem;
        }

        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 1rem;
            background: rgba(61, 26, 16, 0.6);
            border: 1px solid var(--coconut-light);
            border-radius: 8px;
            color: var(--soft-cream);
            font-size: 1rem;
        }

        .form-textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 1.2rem;
            background: var(--coconut-deep);
            border: 2px solid var(--warm-sand-gold);
            color: var(--warm-sand-gold);
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: var(--warm-sand-gold);
            color: var(--coconut-dark);
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 2rem;
        }

        .success-icon {
            font-size: 4rem;
            color: var(--warm-sand-gold);
            margin-bottom: 1rem;
        }

        footer {
            text-align: center;
            padding: 2rem 5%;
            border-top: 1px solid rgba(230, 192, 136, 0.3);
            color: rgba(248, 240, 227, 0.7);
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">傩舞文化</a>
        <a href="index.html" class="back-link">← 返回主页</a>
    </header>

    <main class="feedback-container">
        <div class="feedback-box" id="formBox">
            <h2 class="feedback-title">留言反馈</h2>
            <p class="feedback-subtitle">您的每一条建议，都是非遗传承的助力</p>

            <!-- 关键：这个表单会直接发到你 QQ 邮箱 -->
            <form action="https://formspree.io/f/mdkadevd" method="POST">
                <div class="form-group">
                    <label class="form-label">称呼</label>
                    <input type="text" name="name" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">邮箱</label>
                    <input type="email" name="email" class="form-input">
                </div>

                <div class="form-group">
                    <label class="form-label">反馈类型</label>
                    <select name="type" class="form-select">
                        <option value="文化建议">文化建议</option>
                        <option value="问题反馈">问题反馈</option>
                        <option value="合作洽谈">合作洽谈</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">留言内容</label>
                    <textarea name="message" class="form-textarea" required></textarea>
                </div>

                <button type="submit" class="submit-btn">提交留言</button>
            </form>
        </div>

        <div class="feedback-box success-message" id="successBox">
            <div class="success-icon">🙏</div>
            <h2 class="feedback-title">提交成功</h2>
            <p>感谢您的留言，我们已收到</p>
            <a href="index.html" class="back-link" style="margin-top:2rem;display:inline-block;">返回主页</a>
        </div>
    </main>

    <footer>
        <p>© 2026 傩舞非遗文化传承</p>
    </footer>

    <script>
        const form = document.querySelector('form');
        const formBox = document.getElementById('formBox');
        const successBox = document.getElementById('successBox');

        form.addEventListener('submit', function () {
            setTimeout(() => {
                formBox.style.display = 'none';
                successBox.style.display = 'block';
            }, 500);
        });
    </script>
</body>
</html>
