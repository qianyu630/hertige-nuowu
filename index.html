<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>傩舞非遗文化 - 留言反馈</title>
    <!-- 引入Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "微软雅黑", sans-serif;
        }
        body {
            background-color: #f5f5f5;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover {
            background: #3b82f6;
        }
        .tip {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>傩舞非遗文化 留言反馈</h1>
        <form id="feedbackForm">
            <div class="form-group">
                <label for="user_name">你的昵称</label>
                <input type="text" id="user_name" name="user_name" placeholder="请输入你的昵称" required>
            </div>
            <div class="form-group">
                <label for="contact">联系方式（选填）</label>
                <input type="text" id="contact" name="contact" placeholder="微信/邮箱，方便后续回访">
            </div>
            <div class="form-group">
                <label for="feedback_content">你的反馈/观后感</label>
                <textarea id="feedback_content" name="feedback_content" placeholder="聊聊你对傩舞的看法、建议、观后感..." required></textarea>
            </div>
            <button type="submit" class="btn">提交反馈</button>
        </form>
        <p class="tip">提交成功后，数据会实时同步到后台</p>
    </div>

    <script>
        // 1. 替换成你自己的Supabase信息
        const supabaseUrl = "https://gdyamgzjawtaxgfunfzf.supabase.co";
        const supabaseAnonKey = "sb_publishable_QQjWgVlFY_WW_rqOtZ-RMg_v3oK0dUi"; // 替换成你复制的Publishable key完整内容

        // 2. 初始化Supabase客户端
        const supabase = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        // 3. 表单提交逻辑
        document.getElementById('feedbackForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // 阻止页面刷新

            // 从表单获取用户输入的数据
            const formData = new FormData(e.target);
            const submitData = {
                user_name: formData.get('user_name'),
                联系方式: formData.get('contact'),
                feedback_content: formData.get('feedback_content')
                // created_at 数据库会自动生成，不用手动传
            };

            // 提交数据到Supabase数据库
            const { error } = await supabase
                .from('诺武-赫尔蒂格') // 和你的表名完全一致
                .insert([submitData]);

            // 处理提交结果
            if (error) {
                console.error('提交失败：', error);
                alert('提交失败，请稍后重试！');
            } else {
                alert('提交成功！感谢你的反馈~');
                e.target.reset(); // 清空表单
            }
        });
    </script>
</body>
</html>
